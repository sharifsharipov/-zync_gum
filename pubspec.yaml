name: zync_gum
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  bloc: ^9.1.0
  flutter_bloc: ^9.1.1
  go_router: ^17.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  get_it: ^9.0.5
  injectable: ^2.5.2
  equatable: ^2.0.7
  package_info_plus: ^8.3.0
  cached_network_image: ^3.4.1
  gap: ^3.0.1
  path_provider: ^2.1.5
  freezed_annotation: ^3.1.0
  firebase_core: ^3.14.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.9
  google_sign_in: ^6.2.2
  firebase_messaging: ^15.2.5
  firebase_crashlytics: ^4.3.4
  firebase_remote_config: ^5.3.4
  flutter_local_notifications: ^19.5.0
  flutter_svg: ^2.2.1
  pinput: ^5.0.2
  smart_auth: ^3.2.0
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  shimmer: ^3.0.0
  bloc_concurrency: ^0.3.0
  share_plus: ^11.0.0
  youtube_player_flutter: ^9.1.3
  supabase_flutter: ^2.12.0
  timeago: ^3.7.1
  scale_button: ^2.1.2
  image_picker: ^1.2.1
  json_annotation: ^4.11.0
  geolocator: ^13.0.2
  talker: ^5.1.16
  talker_flutter: ^5.0.0
  talker_bloc_logger: ^5.1.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.10.3
  flutter_gen_runner: ^5.12.0
  injectable_generator: ^2.9.1
  freezed: ^3.2.3
  json_serializable: ^6.13.0
  intl_utils: ^2.8.14
  mockito: ^5.4.6

flutter_gen:
  output: lib/l10n/assets/
  integrations:
    flutter_svg: true

flutter_intl:
  enabled: true

flutter:
  config:
    disable-swift-package-manager: true
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/
    - assets/icons/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
